<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>TCM NFT • Ecosystem Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap');

        :root {
            --primary: #00f5ff; 
            --bg-dark-blue: #0b1120; 
            --bg-deep-dark: #030305; 
            --bg-card: rgba(13, 15, 28, 0.65); 
            --text-main: #f8f9fc; 
            --text-sub: #64748b;
            --border-light: rgba(255, 255, 255, 0.15); 
            --border-dark: rgba(255, 255, 255, 0.02);
            --shadow-heavy: rgba(0,0,0,0.9);
        }

        /* 🔥 SCROLLBAR HIDDEN BUT NATIVE SCROLL FUNCTIONAL 🔥 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none !important; }
        *::-webkit-scrollbar { display: none !important; width: 0 !important; background: transparent !important; }
        
        html, body {
            width: 100%;
            background-color: var(--bg-dark-blue);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: auto; 
            scroll-behavior: smooth;
        }

        body { 
            background: linear-gradient(135deg, var(--bg-dark-blue) 0%, var(--bg-deep-dark) 100%); 
            background-attachment: fixed; 
            min-height: 120vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-top: 100px; padding-bottom: 100px; 
        }

        /* 🔥 PREMIUM HEADER 🔥 */
        .header-top { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between; 
            background: rgba(3, 3, 5, 0.85); backdrop-filter: blur(25px);
            z-index: 1000; border-bottom: 1px solid var(--border-dark); 
            box-shadow: 0 10px 30px var(--shadow-heavy); 
        }
        .logo-box { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; filter: drop-shadow(0 0 5px rgba(0,245,255,0.3)); white-space: nowrap; }
        
        .crypto-ticker { flex: 1; overflow: hidden; margin: 0 15px; display: flex; align-items: center; white-space: nowrap; -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); }
        .ticker-track { display: inline-block; animation: scrollTicker 20s linear infinite; }
        @keyframes scrollTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .t-item { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.03); padding: 5px 10px; border-radius: 12px; margin-right: 10px; font-weight: 600; }

        .header-login-txt { display: flex; gap: 2px; font-family: 'Space Grotesk'; font-size: 0.85rem; font-weight: 800; cursor: pointer; }
        .header-login-txt span { display: inline-block; color: rgba(255,255,255,0.5); animation: periodicWave 6s infinite; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .header-login-txt span:nth-child(1) { animation-delay: 0.0s; } .header-login-txt span:nth-child(2) { animation-delay: 0.1s; } .header-login-txt span:nth-child(3) { animation-delay: 0.2s; } .header-login-txt span:nth-child(4) { animation-delay: 0.3s; } .header-login-txt span:nth-child(5) { animation-delay: 0.4s; } .header-login-txt span:nth-child(6) { animation-delay: 0.5s; }
        @keyframes periodicWave { 0%, 15%, 100% { transform: scale(1) translateY(0); color: rgba(255,255,255,0.5); text-shadow: none; } 7.5% { transform: scale(1.4) translateY(-3px); color: #fff; text-shadow: 0 0 12px #fff, 0 0 20px var(--primary); } }
        
        /* 🔥 MAIN LOGIN BOX 🔥 */
        .login-container { position: relative; width: 100%; max-width: 440px; margin: auto; padding: 0 20px; z-index: 10; animation: floatContainer 6s ease-in-out infinite; }
        @keyframes floatContainer { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .form-pill { position: relative; background: var(--bg-card); backdrop-filter: blur(40px); border-radius: 40px; padding: 50px 25px 40px; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-dark); box-shadow: 0 25px 60px var(--shadow-heavy), inset 0 5px 20px rgba(255,255,255,0.03); text-align: center; }

        .logo-mark { font-size: 3rem; color: var(--primary); margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(0,245,255,0.4)); animation: floatLogo 4s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.05); filter: drop-shadow(0 0 25px rgba(0,245,255,0.6)); } }

        .pill-title { font-family: 'Space Grotesk'; font-size: 1.5rem; font-weight: 800; margin-bottom: 30px; color: #fff; letter-spacing: 1px; }

        /* INPUT FIELDS */
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .input-wrapper i.left-i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 1.1rem; transition: 0.3s; z-index: 2; pointer-events: none; }
        
        .input-wrapper input { width: 100%; padding: 18px 15px 18px 50px; background: #05060a; border: none; border-radius: 35px; color: #fff; outline: none; transition: 0.4s; font-size: 0.95rem; box-shadow: -1px -1px 2px rgba(255,255,255,0.05), 2px 2px 5px rgba(0,0,0,0.8), inset 2px 2px 10px rgba(0,0,0,0.9); }
        .input-wrapper input:focus { box-shadow: inset 2px 2px 12px rgba(0,0,0,0.9), 0 0 15px rgba(0, 245, 255, 0.15); border: 1px solid rgba(0, 245, 255, 0.3); color: #fff; }
        .input-wrapper input:focus + i.left-i { color: var(--primary); filter: drop-shadow(0 0 5px var(--primary)); }

        .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 42px; height: 42px; border-radius: 50%; background: #0a0a15; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); z-index: 3; transition: 0.3s;}

        /* 🔥 GHOST TOUCH & REMEMBER ME 🔥 */
        .row-options { display: flex; justify-content: space-between; align-items: center; margin-top: -5px; margin-bottom: 20px; padding: 0 10px; }
        
        .remember-label { display: flex; align-items: center; gap: 8px; color: var(--text-sub); font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .remember-label input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

        .ghost-touch-text {
            background: linear-gradient(90deg, #64748b 0%, #00f5ff 50%, #64748b 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: ghostSwipe 3s linear infinite;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
        }
        @keyframes ghostSwipe { 0% { background-position: -100% center; } 100% { background-position: 100% center; } }

        /* MAIN BUTTONS */
        .btn-login { width: 100%; padding: 18px; border-radius: 35px; font-weight: 800; font-size: 1rem; letter-spacing: 1px; border: none; position: relative; overflow: hidden; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-disabled { background: #0f1524; color: #334155; cursor: not-allowed; box-shadow: inset 3px 3px 10px rgba(0,0,0,0.8); }
        .btn-active { background: linear-gradient(135deg, var(--primary), #0284c7); color: #020617; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 245, 255, 0.3); }
        .btn-locked { background: #030305 !important; color: var(--primary) !important; box-shadow: inset 4px 4px 15px rgba(0,0,0,1) !important; transform: scale(0.95) !important; border: 1px solid rgba(0,245,255,0.4) !important; }

        .social-ghost-box { margin-top: 25px; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 2px 2px 10px rgba(0,0,0,0.5); }
        .s-icon { color: var(--text-sub); font-size: 1.3rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .s-icon { animation: ghostTouchDark 6s infinite; }
        .s-icon:nth-child(1) { animation-delay: 0s; } .s-icon:nth-child(2) { animation-delay: 0.5s; } .s-icon:nth-child(3) { animation-delay: 1s; } .s-icon:nth-child(4) { animation-delay: 1.5s; }
        @keyframes ghostTouchDark { 0%, 100% { transform: scale(1); text-shadow: none; color: var(--text-sub); } 5% { transform: scale(1.15); text-shadow: 0 0 12px rgba(0, 245, 255, 0.8), 0 0 6px #ffffff; color: #ffffff; } 15% { transform: scale(1); text-shadow: none; color: var(--text-sub); } }
        
        .signup-link { margin-top: 25px; font-size: 0.85rem; color: var(--text-sub); font-weight: 500; display: block; }
        .footer-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 50px; background: var(--bg-card); backdrop-filter: blur(40px); border-radius: 30px; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-dark); box-shadow: 0 10px 30px var(--shadow-heavy), inset 0 5px 15px rgba(255,255,255,0.02); display: flex; justify-content: space-evenly; align-items: center; z-index: 1000; font-size: 0.75rem; font-weight: 700; color: var(--text-sub); letter-spacing: 1px;}

        /* 🔥 SMOOTH MAGIC PORTAL (Half-In Half-Out Avatar) 🔥 */
        #magicPortal { position: fixed; inset: 0; background: rgba(3, 3, 5, 0.90); z-index: 10000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s ease; backdrop-filter: blur(20px); }
        #magicPortal.active { opacity: 1; }
        
        .magic-box { 
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 65px 30px 30px; 
            text-align: center; 
            transform: scale(0.8); 
            opacity: 0; 
            transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
            box-shadow: 0 25px 60px var(--shadow-heavy), inset 0 5px 20px rgba(255,255,255,0.05);
            width: 90%; max-width: 360px;
        }
        .magic-box.show { transform: scale(1); opacity: 1; }

        /* Elevated 3D Profile Avatar */
        .m-avatar-wrapper {
            position: absolute;
            top: -50px; 
            left: 50%;
            transform: translateX(-50%);
            width: 100px; height: 100px;
            border-radius: 50%;
            background: #0b1120;
            padding: 4px;
            box-shadow: 0 -10px 25px rgba(0,245,255,0.2), inset 0 5px 15px rgba(255,255,255,0.05), 0 10px 20px rgba(0,0,0,0.8);
            z-index: 2;
        }
        .m-avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        
        .m-name { font-family: 'Space Grotesk'; font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 25px; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .m-profit-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(0,245,255,0.2); padding: 15px 30px; border-radius: 20px; display: inline-block; box-shadow: inset 0 0 20px rgba(0,245,255,0.1), 0 10px 30px rgba(0,0,0,0.5); }
        .m-profit-val { font-size: 1.8rem; font-weight: 800; color: var(--primary); font-family: 'Space Grotesk', monospace; display: flex; align-items: center; justify-content: center; gap: 5px; min-width: 140px; }

        /* 🔥 FORGOT PASSWORD MODAL (Neumorphic Glass) 🔥 */
        #forgotModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: 0.3s; }
        #forgotModal.show { opacity: 1; }
        .forgot-box { background: rgba(13, 15, 28, 0.85); backdrop-filter: blur(40px); width: 100%; max-width: 380px; border-radius: 30px; padding: 30px; text-align: center; border: 1px solid var(--primary); box-shadow: 0 20px 50px rgba(0, 245, 255, 0.15), inset 0 5px 20px rgba(255,255,255,0.05); transform: scale(0.9); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #forgotModal.show .forgot-box { transform: scale(1); }
        
        .fg-input { width: 100%; padding: 15px; background: #05060a; border: none; border-radius: 15px; margin-bottom: 12px; color: #fff; outline: none; font-size: 0.95rem; box-shadow: inset 2px 2px 10px rgba(0,0,0,0.9), -1px -1px 2px rgba(255,255,255,0.05); transition: 0.3s;}
        .fg-input:focus { box-shadow: inset 2px 2px 12px rgba(0,0,0,0.9), 0 0 15px rgba(0, 245, 255, 0.15); border: 1px solid rgba(0, 245, 255, 0.3); }
        
        .fg-btn { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; font-weight: 800; cursor: pointer; margin-bottom: 15px; transition: 0.3s; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 4px 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .fg-btn:hover { background: rgba(255,255,255,0.1); box-shadow: inset 2px 2px 10px rgba(255,255,255,0.2), 0 5px 20px rgba(0,0,0,0.6); transform: translateY(-2px); }
        
        .fg-btn-success { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05)); border: 1px solid rgba(16, 185, 129, 0.5); color: #10b981; box-shadow: inset 2px 2px 10px rgba(16, 185, 129, 0.2), 0 8px 20px rgba(0,0,0,0.6); }
        .fg-btn-success:hover { background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(16, 185, 129, 0.1)); color: #fff; box-shadow: inset 2px 2px 15px rgba(16, 185, 129, 0.4), 0 10px 25px rgba(16, 185, 129, 0.4); transform: translateY(-2px); }

        @media (max-width: 450px) { 
            .logo-box { font-size: 0.95rem; }
            .header-login-txt { font-size: 0.75rem; gap: 1px; }
            .crypto-ticker { margin: 0 5px; }
            .form-pill { padding: 40px 20px 30px; }
            .m-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="header-top">
        <div class="logo-box" onclick="window.location.href='Signup.html'"><i class="fas fa-cube"></i> TCM NFT</div>
        <div class="crypto-ticker">
            <div class="ticker-track">
                <div class="t-item">BTC <span style="color:#10b981">$64,230</span></div>
                <div class="t-item">ETH <span style="color:#f43f5e">$3,450</span></div>
                <div class="t-item">BNB <span style="color:#10b981">$580.40</span></div>
            </div>
        </div>
        <div class="header-login-txt" onclick="window.location.href='Signup.html'">
            <span>S</span><span>I</span><span>G</span><span>N</span><span>U</span><span>P</span>
        </div>
    </header>

    <div class="login-container">
        <div class="form-pill">
            <i class="fas fa-fingerprint logo-mark"></i>
            <div class="pill-title">ACCESS ECOSYSTEM</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                
                <div class="input-wrapper">
                    <i class="fas fa-user left-i"></i>
                    <input type="text" id="loginUID" placeholder="Email or UID" autocomplete="username" required>
                </div>

                <div class="input-wrapper">
                    <i class="fas fa-lock left-i"></i>
                    <input type="password" id="loginPass" placeholder="Security Key" autocomplete="current-password" required>
                    <div class="eye-btn" onclick="togglePassword()">
                        <i class="far fa-eye" id="eyeIcon" style="color:var(--text-sub); font-size:1.1rem;"></i>
                    </div>
                </div>

                <div class="row-options">
                    <label class="remember-label">
                        <input type="checkbox" id="rememberMe"> Remember Me
                    </label>
                    <a href="#" onclick="openForgotModal()" class="ghost-touch-text">Forgot Password?</a>
                </div>

                <div id="errorBox" style="display: none; margin-bottom: 10px;">
                    <p id="errorTxt" style="color: #ff4c4c; font-size: 0.85rem; font-weight: bold;"></p>
                </div>

                <button type="submit" class="btn-login btn-disabled" id="loginBtn" disabled>
                    <span id="btnText">SECURE LOGIN</span>
                </button>
            </form>

            <div class="social-ghost-box">
                <i class="fab fa-x-twitter s-icon x"></i>
                <i class="fab fa-telegram s-icon tg"></i>
                <i class="fab fa-youtube s-icon yt"></i>
                <i class="fas fa-envelope s-icon gm"></i>
            </div>

            <span class="signup-link">
                New to Ecosystem? <a href="Signup.html" style="color: var(--primary); text-decoration: none; font-weight: 800;">JOIN NOW</a>
            </span>
        </div>
    </div>

    <nav class="footer-nav">
        <span>PRIVACY</span> • <span>TERMS</span> • <span>SUPPORT</span>
    </nav>

    <div id="magicPortal">
        <div class="magic-box" id="magicBox">
            <div class="m-avatar-wrapper">
                <img src="" id="pAvatar" class="m-avatar">
            </div>
            <div style="font-size: 0.9rem; color: var(--text-sub); font-weight: 600;">Welcome Back</div>
            <div class="m-name" id="pName">Loading...</div>
            <div class="m-profit-box">
                <div style="font-size:0.7rem; color:var(--text-sub); text-transform:uppercase;">Comp Profit</div>
                <div class="m-profit-val" id="pProfit">0.00 <span style="color:#fff;">₮</span></div>
            </div>
            <div style="margin-top:25px; font-size:0.85rem; font-weight:600; color:var(--primary);"><i class="fas fa-spinner fa-spin"></i> Entering Dashboard...</div>
        </div>
    </div>

    <div id="forgotModal">
        <div class="forgot-box">
            <h2 style="color: #fff; margin-bottom: 10px; font-family: 'Space Grotesk';"><i class="fas fa-unlock-alt" style="color:var(--primary);"></i> Reset Password</h2>
            <p style="color: var(--text-sub); font-size: 0.85rem; margin-bottom: 15px;">Enter your registered email to receive OTP.</p>
            
            <p id="forgotErrorTxt" style="color: var(--error); font-size: 0.85rem; font-weight: 700; margin-bottom: 15px; min-height: 18px;"></p>

            <input type="email" id="resetEmail" class="fg-input" placeholder="Registered Email ID">
            <button id="btnSendResetOTP" class="fg-btn" onclick="requestResetOTP(event)">Send Recovery OTP</button>

            <div id="resetOtpArea" style="display: none;">
                <input type="number" id="resetOTP" class="fg-input" placeholder="Enter 6-digit OTP">
                <input type="password" id="resetNewPass" class="fg-input" placeholder="Create New Password">
                <button id="btnConfirmReset" class="fg-btn fg-btn-success" onclick="submitNewPassword(event)">Confirm Password</button>
            </div>

            <p onclick="closeForgotModal()" style="color: var(--error); font-size: 0.85rem; cursor: pointer; font-weight: 700; margin-top: 10px;">Cancel & Close</p>
        </div>
    </div>

    <script>
    // ⚠️ Master Backend URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHdGLl4jND30SHOjiig11g-2CsAlyD_VoKD2ZoClQjzqO6p4h_vB22kNmW1bbJMHoo/exec";

    const loginUID = document.getElementById('loginUID');
    const loginPass = document.getElementById('loginPass');
    const loginBtn = document.getElementById('loginBtn');
    const remMeCheck = document.getElementById('rememberMe');
    
    // Strict locks to prevent infinite loops
    let autoLoginTriggered = false;
    let isLoggingIn = false;

    // 🔥 ১. Input Checker & Safe Auto-Login Trigger 🔥
    function checkInputs() {
        if(loginUID.value.trim().length > 3 && loginPass.value.trim().length >= 6) {
            loginBtn.classList.remove('btn-disabled'); loginBtn.classList.add('btn-active'); loginBtn.disabled = false;
            
            // ব্রাউজার যখন অটো-ফিল করবে, তখন ইউজার সিলেক্ট করার সাথে সাথেই একবার লগইন হবে
            if (!autoLoginTriggered && document.activeElement !== loginUID && document.activeElement !== loginPass) {
                autoLoginTriggered = true;
                setTimeout(() => { 
                    if(!isLoggingIn) handleLogin(); 
                }, 600);
            }
        } else {
            loginBtn.classList.add('btn-disabled'); loginBtn.classList.remove('btn-active'); loginBtn.disabled = true;
            autoLoginTriggered = false;
        }
    }

    ['input', 'change', 'keyup'].forEach(evt => {
        loginUID.addEventListener(evt, checkInputs);
        loginPass.addEventListener(evt, checkInputs);
    });

    // 🔥 ২. Local Storage Remember Me Load 🔥
    window.addEventListener('load', () => {
        const savedUid = localStorage.getItem('tcm_rem_uid');
        const savedPass = localStorage.getItem('tcm_rem_pass');
        if(savedUid && savedPass) {
            loginUID.value = savedUid;
            loginPass.value = savedPass;
            remMeCheck.checked = true;
            checkInputs();
            setTimeout(() => { if(!isLoggingIn) handleLogin(); }, 800);
        }
        setTimeout(() => { if(!isLoggingIn) checkInputs(); }, 1500);
    });

    function togglePassword() {
        loginPass.type = loginPass.type === 'password' ? 'text' : 'password';
        const i = document.getElementById('eyeIcon');
        i.classList.toggle('fa-eye'); i.classList.toggle('fa-eye-slash');
        i.style.color = loginPass.type === 'text' ? 'var(--primary)' : 'var(--text-sub)';
    }

    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = (start + (1 - Math.pow(1 - progress, 3)) * (end - start)).toFixed(2) + " <span style='color:#fff;'>₮</span>";
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    // 🔥 ৩. Main Login Function (Bulletproof Payload) 🔥
    async function handleLogin(event) {
        if(event) event.preventDefault();
        
        if(isLoggingIn) return; 
        isLoggingIn = true;
        
        document.getElementById('errorBox').style.display = 'none';
        const btnText = document.getElementById('btnText');
        loginBtn.classList.remove('btn-active'); loginBtn.classList.add('btn-locked'); loginBtn.disabled = true;
        btnText.innerHTML = '<i class="fas fa-lock"></i> SECURING... <i class="fas fa-spinner fa-spin" style="margin-left: 8px;"></i>';

        // 🚨 THE FIX: ডেটা সরাসরি বডিতে পাঠানো হচ্ছে (কোনো data: {} প্যাকেটে নয়)
        const payload = {
            action: "login",
            email: loginUID.value.trim(), 
            password: loginPass.value.trim()
        };

        try {
            const response = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            });
            const d = await response.json();
            
            if (d.success) {
                // Remember Me Logic
                if(remMeCheck.checked) {
                    localStorage.setItem('tcm_rem_uid', loginUID.value.trim());
                    localStorage.setItem('tcm_rem_pass', loginPass.value.trim());
                } else {
                    localStorage.removeItem('tcm_rem_uid'); localStorage.removeItem('tcm_rem_pass');
                }

                localStorage.setItem('uid', d.uid);
                localStorage.setItem('token', d.token);
                localStorage.setItem('name', d.name);
                localStorage.setItem('avatar', d.avatar || "");

                // Magic Portal Animation Trigger
                document.getElementById('pName').innerText = d.name;
                document.getElementById('pAvatar').src = (d.avatar && d.avatar.length > 20) ? d.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=00f5ff&color=0a0a2e&bold=true`;

                const portal = document.getElementById('magicPortal');
                portal.style.display = 'flex';
                setTimeout(() => portal.classList.add('active'), 50); 
                setTimeout(() => {
                    document.getElementById('magicBox').classList.add('show');
                    animateValue(document.getElementById('pProfit'), 0, parseFloat(d.totalComp) || 0, 1500);
                }, 150);
                
                setTimeout(() => { window.location.replace("Dashboard.html"); }, 3000);

            } else {
                showLoginError(d.message === "USER_NOT_FOUND" ? "Incorrect Email or Key" : d.message);
            }
        } catch (error) {
            showLoginError("Network Error. Please try again.");
        }
    }

    function showLoginError(msg) {
        document.getElementById('errorTxt').innerText = msg;
        document.getElementById('errorBox').style.display = 'block';
        loginBtn.classList.remove('btn-locked'); loginBtn.classList.add('btn-active'); loginBtn.disabled = false;
        document.getElementById('btnText').innerText = "SECURE LOGIN";
        isLoggingIn = false; 
        autoLoginTriggered = false;
    }

    // 🔥 ৪. Forgot Password Logic (Fixed Payload) 🔥
    function openForgotModal() { document.getElementById('forgotModal').style.display = 'flex'; setTimeout(() => document.getElementById('forgotModal').classList.add('show'), 10); }
    function closeForgotModal() { document.getElementById('forgotModal').classList.remove('show'); setTimeout(() => document.getElementById('forgotModal').style.display = 'none', 300); }

    async function requestResetOTP(e) {
        if(e) e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();
        const errorTxt = document.getElementById('forgotErrorTxt');
        errorTxt.innerText = "";
        errorTxt.style.color = "var(--error)";

        if(!email) { errorTxt.innerText = "Please enter your registered email!"; return; }
        
        const btn = document.getElementById('btnSendResetOTP');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...'; btn.disabled = true;

        // 🚨 THE FIX: ডেটা সরাসরি বডিতে পাঠানো হচ্ছে
        const payload = { action: "sendResetOTP", email: email };

        try {
            const res = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            });
            const d = await res.json();
            if(d.success) {
                errorTxt.style.color = "var(--success)";
                errorTxt.innerText = d.message;
                document.getElementById('resetOtpArea').style.display = 'block';
                btn.style.display = 'none';
            } else { 
                errorTxt.innerText = d.message; 
                btn.innerHTML = 'Send Recovery OTP'; btn.disabled = false; 
            }
        } catch(err) { 
            errorTxt.innerText = "Network Error!"; 
            btn.innerHTML = 'Send Recovery OTP'; btn.disabled = false; 
        }
    }

    async function submitNewPassword(e) {
        if(e) e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();
        const otp = document.getElementById('resetOTP').value.trim();
        const newPass = document.getElementById('resetNewPass').value.trim();
        const errorTxt = document.getElementById('forgotErrorTxt');
        errorTxt.innerText = "";
        errorTxt.style.color = "var(--error)";

        if(!otp || !newPass) { errorTxt.innerText = "Please fill OTP and New Password!"; return; }
        if(newPass.length < 6) { errorTxt.innerText = "Password must be at least 6 characters!"; return; }

        const btn = document.getElementById('btnConfirmReset');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...'; btn.disabled = true;

        // 🚨 THE FIX: ডেটা সরাসরি বডিতে পাঠানো হচ্ছে
        const payload = { action: "resetPassword", email: email, otp: otp, newPassword: newPass };

        try {
            const res = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            });
            const d = await res.json();
            if(d.success) {
                errorTxt.style.color = "var(--success)";
                errorTxt.innerText = "Success! " + d.message;
                
                setTimeout(() => {
                    closeForgotModal();
                    document.getElementById('resetOTP').value = ""; document.getElementById('resetNewPass').value = "";
                    document.getElementById('resetOtpArea').style.display = 'none';
                    document.getElementById('btnSendResetOTP').style.display = 'block';
                    document.getElementById('btnSendResetOTP').innerHTML = 'Send Recovery OTP';
                    document.getElementById('btnSendResetOTP').disabled = false;
                    btn.innerHTML = 'Confirm Password'; btn.disabled = false;
                    errorTxt.innerText = "";
                }, 2000);
            } else { 
                errorTxt.innerText = d.message; 
                btn.innerHTML = 'Confirm Password'; btn.disabled = false; 
            }
        } catch(err) { 
            errorTxt.innerText = "Network Error!"; 
            btn.innerHTML = 'Confirm Password'; btn.disabled = false; 
        }
    }
    </script>
