<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>TCM NFT • Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap');
        :root { --primary: #00f5ff; --bg-dark-blue: #0b1120; --bg-deep-dark: #030305; --bg-card: rgba(13, 15, 28, 0.65); --text-main: #f8f9fc; --text-sub: #64748b; --border-light: rgba(255, 255, 255, 0.15); --border-dark: rgba(255, 255, 255, 0.02); --shadow-heavy: rgba(0,0,0,0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -ms-overflow-style: none !important; scrollbar-width: none !important; }
        *::-webkit-scrollbar { display: none !important; }
        html { background-color: var(--bg-dark-blue); height: 100%; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-dark-blue) 0%, var(--bg-deep-dark) 100%); background-attachment: fixed; color: var(--text-main); min-height: 100vh; padding-top: 110px; padding-bottom: 140px; }
        
        .header-top { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(3, 3, 5, 0.85); backdrop-filter: blur(25px); z-index: 1000; border-bottom: 1px solid var(--border-dark); box-shadow: 0 10px 30px var(--shadow-heavy); }
        .logo-box { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; filter: drop-shadow(0 0 5px rgba(0,245,255,0.3)); white-space: nowrap; }
        .crypto-ticker { flex: 1; overflow: hidden; margin: 0 15px; display: flex; align-items: center; white-space: nowrap; -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); }
        .ticker-track { display: inline-block; animation: scrollTicker 20s linear infinite; }
        @keyframes scrollTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .t-item { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.03); padding: 5px 10px; border-radius: 12px; margin-right: 10px; font-weight: 600; }
        
        .header-login-txt { display: flex; gap: 2px; font-family: 'Space Grotesk'; font-size: 0.85rem; font-weight: 800; cursor: pointer; }
        .header-login-txt span { display: inline-block; color: rgba(255,255,255,0.5); animation: periodicWave 6s infinite; transition: all 0.3s ease; }
        .header-login-txt span:nth-child(1) { animation-delay: 0.0s; } .header-login-txt span:nth-child(2) { animation-delay: 0.1s; } .header-login-txt span:nth-child(3) { animation-delay: 0.2s; } .header-login-txt span:nth-child(4) { animation-delay: 0.3s; } .header-login-txt span:nth-child(5) { animation-delay: 0.4s; } .header-login-txt span:nth-child(6) { animation-delay: 0.5s; }
        @keyframes periodicWave { 0%, 15%, 100% { transform: scale(1) translateY(0); color: rgba(255,255,255,0.5); text-shadow: none; } 7.5% { transform: scale(1.4) translateY(-3px); color: #fff; text-shadow: 0 0 12px #fff, 0 0 20px var(--primary); } }
        .header-login-txt:active span { animation: none !important; transform: scale(1.3) translateY(-2px) !important; color: #fff !important; text-shadow: 0 0 15px #fff, 0 0 20px var(--primary) !important; }

        .login-container { position: relative; width: 100%; max-width: 440px; margin: 0 auto; padding: 0 20px; z-index: 10; }
        .form-pill { position: relative; background: var(--bg-card); backdrop-filter: blur(40px); border-radius: 40px; padding: 65px 25px 35px; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-dark); box-shadow: 0 25px 60px var(--shadow-heavy), inset 0 5px 20px rgba(255,255,255,0.03); text-align: center; margin-top: 60px; }

        .avatar-neumorphic { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; border-radius: 50%; background: #0b1120; display: flex; align-items: center; justify-content: center; border: 1.5px solid rgba(0, 245, 255, 0.3); box-shadow: -4px -4px 10px rgba(255, 255, 255, 0.05), 6px 6px 20px rgba(0, 0, 0, 0.9), inset 4px 4px 12px rgba(0, 0, 0, 0.9), inset -2px -2px 10px rgba(0, 245, 255, 0.15); z-index: 15; cursor: pointer; transition: 0.3s; }
        .avatar-neumorphic:active { transform: translateX(-50%) scale(0.95); box-shadow: inset 0 0 15px rgba(0, 245, 255, 0.2); }
        .avatar-neumorphic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; padding: 18px; filter: drop-shadow(0 0 8px rgba(0,245,255,0.4)); transition: 0.3s; }
        .avatar-neumorphic img.uploaded { padding: 4px; filter: none; border: 2px solid rgba(0, 245, 255, 0.5); }
        .camera-badge { position: absolute; bottom: 0; right: 0; background: var(--primary); color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; box-shadow: 0 0 15px var(--primary); border: 2.5px solid #0b1120; }

        .pill-title { font-family: 'Space Grotesk'; font-size: 1.4rem; font-weight: 800; margin-bottom: 25px; color: #fff; letter-spacing: 1px; }
        .grid-phone { display: grid; grid-template-columns: 42% 54%; gap: 4%; margin-bottom: 20px; }
        .grid-half { display: grid; grid-template-columns: 48% 48%; gap: 4%; margin-bottom: 20px; }

        .input-wrapper { position: relative; margin-bottom: 20px; }
        .input-wrapper.grid-item { margin-bottom: 0; }
        .input-wrapper i.left-i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 1.1rem; z-index: 2; pointer-events: none; }
        .input-wrapper i.right-i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 0.8rem; z-index: 2; }
        .input-wrapper input, .input-wrapper select { width: 100%; padding: 16px 15px 16px 50px; background: #05060a; border: none; border-radius: 35px; color: #fff; outline: none; transition: 0.4s; font-size: 0.9rem; box-shadow: inset 2px 2px 10px rgba(0,0,0,0.9); }
        .code-select { padding-left: 38px !important; padding-right: 22px !important; }
        .input-wrapper select { appearance: none; -webkit-appearance: none; cursor: pointer; color: var(--text-sub); }
        .input-wrapper select option { background: #0b1120; color: #fff; }
        .input-wrapper input:focus, .input-wrapper select:focus { border: 1px solid rgba(0, 245, 255, 0.3); color: #fff; box-shadow: inset 2px 2px 12px rgba(0,0,0,0.9), 0 0 15px rgba(0, 245, 255, 0.15); }
        .input-wrapper input:focus + i.left-i, .input-wrapper select:focus + i.left-i { color: var(--primary); filter: drop-shadow(0 0 5px var(--primary)); }
        
        .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; border-radius: 50%; background: #0a0a15; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); z-index: 3;}

        .btn-register { width: 100%; padding: 18px; border-radius: 35px; font-weight: 800; font-size: 1rem; letter-spacing: 1px; border: none; transition: 0.3s; margin-top: 15px; }
        .btn-disabled { background: #0f1524; color: #334155; cursor: not-allowed; }
        .btn-active { background: linear-gradient(135deg, var(--primary), #0284c7); color: #020617; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 245, 255, 0.3); }

        .footer-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 55px; background: var(--bg-card); backdrop-filter: blur(40px); border-radius: 30px; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-dark); box-shadow: 0 10px 30px var(--shadow-heavy), inset 0 5px 15px rgba(255,255,255,0.02); display: flex; justify-content: space-evenly; align-items: center; z-index: 1000; }
        .f-brand { display: flex; align-items: center; gap: 8px; color: var(--text-sub); font-size: 0.85rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; cursor: pointer; transition: 0.2s; }
        .f-brand:active { transform: scale(1.15) translateY(-3px) !important; color: #fff !important; text-shadow: 0 0 15px #fff, 0 0 25px var(--primary) !important; }
        .divider-line { width: 1px; height: 25px; background: rgba(255,255,255,0.1); }

        /* 🔥 PREMIUM UID REVEAL PORTAL 🔥 */
        #uidPortal { position: fixed; inset: 0; background: rgba(5, 8, 15, 0.85); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); opacity: 0; transition: 0.4s ease; }
        #uidPortal.active { opacity: 1; }
        .uid-box { background: linear-gradient(145deg, #0b1120 0%, #030305 100%); border: 1px solid rgba(0, 245, 255, 0.4); border-radius: 28px; padding: 40px 30px; text-align: center; transform: scale(0.8); opacity: 0; transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 20px 50px rgba(0,0,0,1), inset 0 0 20px rgba(0, 245, 255, 0.1); width: 90%; max-width: 380px; }
        .uid-box.show { opacity: 1; transform: scale(1); }
        
        .uid-display-wrapper { display: flex; align-items: center; justify-content: space-between; background: #05060a; padding: 12px 20px; border-radius: 16px; border: 1px dashed rgba(0, 245, 255, 0.4); margin-bottom: 25px; box-shadow: inset 0 0 15px rgba(0,0,0,0.9); }
        .uid-text { font-family: 'Space Grotesk'; font-size: 1.8rem; font-weight: 800; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,245,255,0.5); }
        
        .copy-uid-btn { background: rgba(0, 245, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 245, 255, 0.3); width: 42px; height: 42px; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .copy-uid-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0, 245, 255, 0.6); transform: translateY(-3px); }
        .copy-uid-btn:active { transform: scale(0.9); }
        .copy-uid-btn.success { background: var(--success); color: #000; border-color: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }

        @media (max-width: 450px) { .logo-box { font-size: 0.95rem; } .header-login-txt { font-size: 0.75rem; } .f-brand { font-size: 0.75rem; } }
    </style>
</head>
<body>

    <header class="header-top">
        <div class="logo-box" onclick="window.location.href='index.html'"><i class="fas fa-cube"></i> TCM NFT</div>
        <div class="crypto-ticker">
            <div class="ticker-track">
                <div class="t-item">BTC <span style="color:#10b981">$64,230</span></div>
                <div class="t-item">ETH <span style="color:#f43f5e">$3,450</span></div>
                <div class="t-item">BNB <span style="color:#10b981">$580.40</span></div>
            </div>
        </div>
        <div class="header-login-txt" ontouchstart="" onclick="window.location.href='index.html'">
            <span>L</span><span>O</span><span>G</span><span>I</span><span>N</span>
        </div>
    </header>

    <div class="login-container">
        <div class="form-pill">
            <div class="avatar-neumorphic" onclick="document.getElementById('avatarUpload').click()">
                <img src="https://api.iconify.design/solar:user-bold-duotone.svg?color=%2300f5ff" id="mainAvatar" alt="Upload Avatar">
                <div class="camera-badge"><i class="fas fa-camera"></i></div>
            </div>
            <input type="file" id="avatarUpload" accept="image/png, image/jpeg, image/webp" style="display: none;">

            <div class="pill-title">CREATE ACCOUNT</div>

            <div class="input-wrapper"><i class="fas fa-user left-i"></i><input type="text" id="regName" placeholder="Full Name" autocomplete="off"></div>
            <div class="input-wrapper"><i class="fas fa-envelope left-i"></i><input type="email" id="regEmail" placeholder="Email Address" autocomplete="off"></div>

            <div class="grid-phone">
                <div class="input-wrapper grid-item"><i class="fas fa-globe left-i" style="left: 12px;"></i>
                    <select id="countryCode" class="code-select" required><option value="+91" selected>🇮🇳 +91</option><option value="+880">🇧🇩 +880</option><option value="+1">🇺🇸 +1</option><option value="+44">🇬🇧 +44</option></select><i class="fas fa-chevron-down right-i"></i>
                </div>
                <div class="input-wrapper grid-item"><i class="fas fa-phone left-i"></i><input type="tel" id="regPhone" placeholder="Phone Number" autocomplete="off"></div>
            </div>

            <div class="grid-half">
                <div class="input-wrapper grid-item"><i class="fas fa-flag left-i"></i>
                    <select id="regCountry" required><option value="" disabled selected>Country</option><option value="India">India</option><option value="Bangladesh">Bangladesh</option><option value="USA">USA</option></select><i class="fas fa-chevron-down right-i"></i>
                </div>
                <div class="input-wrapper grid-item"><i class="fas fa-pray left-i"></i>
                    <select id="regReligion" required><option value="" disabled selected>Religion</option><option value="Islam">Islam</option><option value="Hindu">Hindu</option><option value="Christian">Christian</option></select><i class="fas fa-chevron-down right-i"></i>
                </div>
            </div>

            <div class="input-wrapper"><i class="fas fa-users left-i"></i><input type="text" id="regSponsor" placeholder="Sponsor UID (Optional)" autocomplete="off"></div>
            <div class="input-wrapper"><i class="fas fa-lock left-i"></i><input type="password" id="regPass" placeholder="Secure Password">
                <div class="eye-btn" onclick="togglePassword()"><i class="far fa-eye" id="eyeIcon" style="color:var(--text-sub);"></i></div>
            </div>

            <div id="errorBox" style="display: none; margin-bottom: 10px;"><p id="errorTxt" style="color: #ff4c4c; font-size: 0.85rem; font-weight: bold;"></p></div>

            <button class="btn-register btn-disabled" id="regBtn" disabled onclick="handleRegister(event)">
                <span id="btnText">JOIN ECOSYSTEM</span>
            </button>
            <p style="margin-top: 25px; font-size: 0.85rem; color: var(--text-sub); font-weight: 500;">
                Already a citizen? <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 800;">LOGIN HERE</a>
            </p>
        </div>
    </div>

    <nav class="footer-nav">
        <div class="f-brand" ontouchstart="" onclick="window.open('https://x.com', '_blank')"><i class="fab fa-x-twitter"></i> <span>X.COM</span></div>
        <div class="divider-line"></div>
        <div class="f-brand" ontouchstart="" onclick="window.open('https://telegram.org', '_blank')"><i class="fab fa-telegram"></i> <span>TELEGRAM</span></div>
        <div class="divider-line"></div>
        <div class="f-brand" ontouchstart="" onclick="window.open('https://facebook.com', '_blank')"><i class="fab fa-facebook"></i> <span>FACEBOOK</span></div>
    </nav>

    <div id="uidPortal">
        <div class="uid-box" id="uidBox">
            <i class="fas fa-fingerprint" style="font-size:3.5rem; color:var(--primary); margin-bottom:15px; text-shadow:0 0 20px rgba(0,245,255,0.6);"></i>
            <div style="font-size: 0.85rem; color: var(--text-sub); letter-spacing: 4px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px;">Identity Secured</div>
            
            <div class="uid-display-wrapper">
                <div class="uid-text" id="newUID">TCM------</div>
                <div class="copy-uid-btn" id="copyUidFinalBtn" onclick="copyGeneratedUID()">
                    <i class="far fa-copy"></i>
                </div>
            </div>

            <p style="color: var(--success); font-size: 0.9rem; font-weight: 700;"><i class="fas fa-check-circle"></i> Registration Successful</p>
            <div style="font-size: 0.8rem; color: var(--text-sub); margin-top: 15px; font-family: monospace; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                Auto-redirecting in <span id="regTimer" style="color: var(--primary); font-weight: bold; font-size: 1rem;">8</span>s...
            </div>
        </div>
    </div>

    <script>
    // 🔥 MASTER SYNCED URL 🔥
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHdGLl4jND30SHOjiig11g-2CsAlyD_VoKD2ZoClQjzqO6p4h_vB22kNmW1bbJMHoo/exec";

    const nameInput = document.getElementById('regName'); 
    const emailInput = document.getElementById('regEmail'); 
    const passInput = document.getElementById('regPass');
    const phoneInput = document.getElementById('regPhone'); 
    const countryInput = document.getElementById('regCountry'); 
    const religionInput = document.getElementById('regReligion');
    const sponsorInput = document.getElementById('regSponsor'); 
    const regBtn = document.getElementById('regBtn');
    
    let avatarBase64 = "";

    document.getElementById('avatarUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                avatarBase64 = event.target.result;
                document.getElementById('mainAvatar').src = avatarBase64;
                document.getElementById('mainAvatar').classList.add('uploaded');
            }
            reader.readAsDataURL(file);
        }
    });

    function checkInputs() {
        if (nameInput.value.trim().length >= 3 && 
            emailInput.value.includes('@') && 
            passInput.value.trim().length >= 6 && 
            countryInput.value !== "" && 
            religionInput.value !== "") {
            
            regBtn.classList.remove('btn-disabled'); 
            regBtn.classList.add('btn-active'); 
            regBtn.disabled = false;
        } else {
            regBtn.classList.add('btn-disabled'); 
            regBtn.classList.remove('btn-active'); 
            regBtn.disabled = true;
        }
    }

    ['input', 'change', 'keyup'].forEach(evt => {
        nameInput.addEventListener(evt, checkInputs);
        emailInput.addEventListener(evt, checkInputs);
        passInput.addEventListener(evt, checkInputs);
        phoneInput.addEventListener(evt, checkInputs);
    });

    ['change', 'input'].forEach(evt => {
        countryInput.addEventListener(evt, checkInputs);
        religionInput.addEventListener(evt, checkInputs);
    });

    window.addEventListener('load', checkInputs);

    function togglePassword() { 
        const p = document.getElementById('regPass'); 
        const i = document.getElementById('eyeIcon'); 
        p.type = p.type === 'password' ? 'text' : 'password'; 
        i.classList.toggle('fa-eye'); 
        i.classList.toggle('fa-eye-slash'); 
        i.style.color = p.type === 'text' ? 'var(--primary)' : 'var(--text-sub)'; 
    }

    function showError(msg) { 
        document.getElementById('errorTxt').innerText = msg; 
        document.getElementById('errorBox').style.display = 'block'; 
        regBtn.disabled = false; 
    }

    async function handleRegister(event) {
        // 🚨 পেজ সাদা হয়ে যাওয়া বন্ধ করবে
        if(event) event.preventDefault();

        document.getElementById('errorBox').style.display = 'none';
        const btnText = document.getElementById('btnText');
        regBtn.classList.remove('btn-active'); regBtn.classList.add('btn-disabled'); regBtn.disabled = true;
        btnText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SECURING...';

        const combinedPhone = document.getElementById('countryCode').value + document.getElementById('regPhone').value.trim();

        // 🚨 ডেটা পাঠানোর সঠিক পেলোড (data প্যাকেটের ভেতর)
               // 🚨 THE FIX: ডেটা সরাসরি পাঠাতে হবে (কোনো data প্যাকেটের ভেতর নয়)
        const payload = {
            action: "register",
            name: nameInput.value.trim(), 
            email: emailInput.value.trim(), 
            password: passInput.value.trim(),
            phone: combinedPhone, 
            country: countryInput.value, 
            religion: religionInput.value, 
            sponsor: sponsorInput.value.trim(),
            avatar: avatarBase64
        };

        try {
            const response = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            });

            const d = await response.json();
            
            if (d.success) {
                // ব্রাউজারে ডাটা সেভ করা হচ্ছে
                localStorage.setItem("uid", d.uid);
                localStorage.setItem("token", d.token);
                localStorage.setItem("name", nameInput.value.trim());
                
                showUIDReveal(d.uid);
            } else {
                showError("Error: " + (d.message || "Registration Failed"));
                btnText.innerText = "JOIN ECOSYSTEM";
                checkInputs();
            }
        } catch (error) {
            showError("Network Error. Please try again.");
            btnText.innerText = "JOIN ECOSYSTEM";
            checkInputs();
        }
    }

    // 🔥 UID কপি করার ফাংশন 🔥
    function copyGeneratedUID() {
        const uidText = document.getElementById('newUID').innerText;
        navigator.clipboard.writeText(uidText).then(() => {
            const btn = document.getElementById('copyUidFinalBtn');
            btn.classList.add('success');
            btn.innerHTML = '<i class="fas fa-check"></i>'; 
            
            setTimeout(() => {
                btn.classList.remove('success');
                btn.innerHTML = '<i class="far fa-copy"></i>'; 
            }, 2000);
        });
    }

    function showUIDReveal(uid) {
        const portal = document.getElementById('uidPortal'); 
        const uidBox = document.getElementById('uidBox'); 
        const timerEl = document.getElementById('regTimer');
        document.getElementById('newUID').innerText = uid;
        
        portal.style.display = 'flex'; 
        setTimeout(() => portal.classList.add('active'), 50); 
        setTimeout(() => uidBox.classList.add('show'), 150);
        
        let timeLeft = 8; // ৮ সেকেন্ড সময় দেওয়া হলো
        timerEl.innerText = timeLeft;
        
        setInterval(() => { 
            timeLeft--; 
            if(timeLeft > 0) timerEl.innerText = timeLeft; 
        }, 1000);
        
        // 🚨 অটোমেটিক ড্যাশবোর্ডে রিডাইরেক্ট হবে
        setTimeout(() => window.location.replace("Dashboard.html"), 8000); 
    }
    </script>

</body>
</html>
